<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>1001 Albums</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Your CSS -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app-shell">

    <!-- SIDEBAR -->
<aside id="sidebar" class="sidebar">

  <div class="sidebar-header">
    <span class="sidebar-title">1001 Albums</span>
    <button id="toggleSidebar" class="sidebar-toggle">⟨⟨</button>
  </div>

  <nav class="sidebar-nav">
    <button class="nav-item" id="navRandom">🎲 <span>Random</span></button>
    <button class="nav-item" id="navBrowse">📚 <span>Browse</span></button>
    <button class="nav-item" id="navListened">✔ <span>Listened</span></button>
  </nav>

  <div class="sidebar-progress">
    <span class="sidebar-progress-label">Progress</span>
    <div class="sidebar-progress-bar">
      <div id="sidebarProgressFill" class="sidebar-progress-fill"></div>
    </div>
  </div>

</aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- HEADER -->
      <header class="header">
        <div class="search-box">
          <!-- Search icon -->
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="currentColor" d="M10 2a8 8 0 1 1 0 16 8 8 0 0 1 0-16zm11 19l-6-6"/>
          </svg>
          <input id="searchInput" type="text" placeholder="Search albums or artists" />
        </div>

        <button id="randomBtn" class="random-btn">
          <!-- Shuffle icon -->
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="currentColor" d="M17 3h4v4h-2V5h-2zm2 12h2v4h-4v-2h2zm-5.6-1.2l-2.8-2.8 2.8-2.8L10 6l-4 4 4 4 3.4-2.2z"/>
          </svg>
          <span>Random</span>
        </button>
      </header>

      <!-- PROGRESS BAR -->
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>

      <!-- RANDOM ALBUM -->
      <div id="randomAlbum" class="random-card hidden"></div>

      <!-- NOTES PANEL -->
      <div id="notesPanel" class="notes-panel hidden"></div>

      <!-- GRID -->
      <div id="albumGrid" class="album-grid"></div>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
