<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>1001 Albums</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app-shell">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-top">
        <h1 class="sidebar-title">1001 Albums</h1>
        <button id="toggleSidebar" class="sidebar-toggle">
          <!-- ChevronLeft icon -->
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="currentColor" d="M15 18l-6-6 6-6" />
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <div class="sidebar-item">
          <!-- Home icon -->
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="currentColor" d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2h-4v-7H9v7H5a2 2 0 0 1-2-2z"/>
          </svg>
          <span>Random</span>
        </div>

        <div class="sidebar-item">
          <!-- Grid icon -->
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="currentColor" d="M3 3h8v8H3zm10 0h8v8h-8zM3 13h8v8H3zm10 0h8v8h-8z"/>
          </svg>
          <span>Browse</span>
        </div>

        <div class="sidebar-item">
          <!-- CheckCircle icon -->
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="currentColor" d="M12 22a10 10 0 1 1 0-20 10 10 0 0 1 0 20zm-1-6l6-6-1.4-1.4L11 13.2l-2.6-2.6L7 12l4 4z"/>
          </svg>
          <span>Listened</span>
        </div>
      </nav>

      <div class="sidebar-progress">
        <span class="sidebar-progress-label">Progress</span>
        <div class="sidebar-progress-bar">
          <div id="sidebarProgressFill" class="sidebar-progress-fill"></div>
        </div>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- HEADER -->
      <header class="header">
        <div class="search-box">
          <!-- Search icon -->
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="currentColor" d="M10 2a8 8 0 1 1 0 16 8 8 0 0 1 0-16zm11 19l-6-6"/>
          </svg>
          <input id="searchInput" type="text" placeholder="Search albums or artists" />
        </div>

        <button id="randomBtn" class="random-btn">
          <!-- Shuffle icon -->
          <svg width="18" height="18" viewBox="0 0 24 24">
            <path fill="currentColor" d="M17 3h4v4h-2V5h-2zm2 12h2v4h-4v-2h2zm-5.6-1.2l-2.8-2.8 2.8-2.8L10 6l-4 4 4 4 3.4-2.2z"/>
          </svg>
          <span>Random</span>
        </button>
      </header>

      <!-- PROGRESS BAR -->
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>

      <!-- RANDOM ALBUM -->
      <div id="randomAlbum" class="random-card hidden"></div>

      <!-- NOTES PANEL -->
      <div id="notesPanel" class="notes-panel hidden"></div>

      <!-- GRID -->
      <div id="albumGrid" class="album-grid"></div>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
